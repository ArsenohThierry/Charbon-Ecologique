<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lots de production</title>
</head>
<body>

<h1>Lots de production</h1>

<p th:if="${succes}" th:text="${succes}"></p>

<a href="/lots/nouveau">+ Nouveau lot</a>

<br><br>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
        <tr>
            <th>Référence</th>
            <th>Matière première</th>
            <th>Produit</th>
            <th>Qté matière (kg)</th>
            <th>Qté prévue</th>
            <th>Qté réelle</th>
            <th>Date entrée</th>
            <th>Date fin réelle</th>
            <th>Remarques</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="lot : ${lots}">
            <td th:text="${lot.reference}"></td>
            <td th:text="${lot.typeMatierePremiere.libelle}"></td>
            <td th:text="${lot.produit.nom}"></td>
            <td th:text="${lot.quantiteMatiereUtilisee}"></td>
            <td th:text="${lot.quantiteProduitPrevue == T(java.lang.Integer).MAX_VALUE ? 'À définir' : lot.quantiteProduitPrevue}"></td>
            <td th:text="${lot.quantiteProduitReelle != null ? lot.quantiteProduitReelle : '-'}"></td>
            <td th:text="${#temporals.format(lot.dateEntreeLot, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${lot.dateFinReelle != null ? #temporals.format(lot.dateFinReelle, 'dd/MM/yyyy HH:mm') : '-'}"></td>
            <td th:text="${lot.remarques != null ? lot.remarques : '-'}"></td>
            <td>
                <a th:href="@{/lots/{id}/modifier(id=${lot.id})}">Modifier</a>
                &nbsp;|&nbsp;
                <form th:action="@{/lots/{id}/supprimer(id=${lot.id})}"
                      method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer ce lot ?')">
                    <button type="submit">Supprimer</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(lots)}">
            <td colspan="10">Aucun lot enregistré.</td>
        </tr>
    </tbody>
</table>

</body>
</html>
