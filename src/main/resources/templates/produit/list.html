<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des produits - Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="../static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="../static/css/fonts.css" />
</head>
<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex">
<aside th:replace="~{fragments/sidebar :: sidebar('produits')}"></aside>
<main class="flex-1 p-8">

<h1 class="text-3xl font-bold text-brand-dark mb-6">Produits</h1>

<p th:if="${succes}" th:text="${succes}" class="mb-4 p-4 bg-green-100 text-green-800 rounded-xl"></p>

<a th:href="@{/produits/nouveau}" class="inline-block mb-6 px-6 py-2 bg-brand-success text-white rounded-lg hover:opacity-90 transition-colors">+ Nouveau produit</a>

<!-- BEGIN: Filters Section -->
<form class="flex flex-wrap gap-4 mb-8 items-end" method="get" th:action="@{/produits}">
  <!-- Recherche par nom -->
  <div class="w-72">
    <label class="block text-xs font-semibold text-gray-500 mb-1">Nom du produit</label>
    <div class="relative">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
      </span>
      <input name="nom" th:value="${critNom}"
        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-brand-success focus:border-brand-success"
        placeholder="Ex. Charbon rond" type="text" />
    </div>
  </div>

  <!-- Prix min -->
  <div>
    <label class="block text-xs font-semibold text-gray-500 mb-1">Prix min (Ar)</label>
    <input name="puMin" th:value="${critPuMin}"
      class="block w-40 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-brand-success focus:border-brand-success bg-white"
      type="number" step="100" min="0" />
  </div>

  <!-- Prix max -->
  <div>
    <label class="block text-xs font-semibold text-gray-500 mb-1">Prix max (Ar)</label>
    <input name="puMax" th:value="${critPuMax}"
      class="block w-40 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-brand-success focus:border-brand-success bg-white"
      type="number" step="100" min="0" />
  </div>

  <!-- Hidden tri/direction/taille (au cas où on filtrerait) -->
  <input type="hidden" name="tri" th:value="${critTri}" />
  <input type="hidden" name="direction" th:value="${critDirection}" />
  <input type="hidden" name="taille" th:value="${critTaille}" />

  <button type="submit"
    class="bg-brand-success hover:bg-brand-dark text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">
    Filtrer
  </button>
  <a th:href="@{/produits}"
    class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg text-sm font-medium transition-colors">
    Effacer
  </a>
</form>
<!-- END: Filters Section -->

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
<table class="w-full text-sm">
    <thead>
      <tr class="bg-gray-50 text-left text-gray-600">
        <th class="p-4 font-semibold">
          <a class="flex items-center gap-1 hover:text-brand-dark"
             th:href="@{/produits(nom=${critNom}, puMin=${critPuMin}, puMax=${critPuMax}, tri='id', direction=${(critTri == 'id' and critDirection == 'asc') ? 'desc' : 'asc'}, taille=${critTaille})}">
            <span>#</span>
            <span th:if="${critTri == 'id'}" th:text="${critDirection == 'asc' ? '▲' : '▼'}"></span>
          </a>
        </th>
        <th class="p-4 font-semibold">
          <a class="flex items-center gap-1 hover:text-brand-dark"
             th:href="@{/produits(nom=${critNom}, puMin=${critPuMin}, puMax=${critPuMax}, tri='nom', direction=${(critTri == 'nom' and critDirection == 'asc') ? 'desc' : 'asc'}, taille=${critTaille})}">
            <span>Nom</span>
            <span th:if="${critTri == 'nom'}" th:text="${critDirection == 'asc' ? '▲' : '▼'}"></span>
          </a>
        </th>
        <th class="p-4 font-semibold">
          <a class="flex items-center gap-1 hover:text-brand-dark"
             th:href="@{/produits(nom=${critNom}, puMin=${critPuMin}, puMax=${critPuMax}, tri='pu', direction=${(critTri == 'pu' and critDirection == 'asc') ? 'desc' : 'asc'}, taille=${critTaille})}">
            <span>Prix unitaire (Ar)</span>
            <span th:if="${critTri == 'pu'}" th:text="${critDirection == 'asc' ? '▲' : '▼'}"></span>
          </a>
        </th>
        <th class="p-4 font-semibold text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
        <tr th:each="produit : ${produits}" class="border-t border-gray-100 hover:bg-gray-50">
            <td class="p-4" th:text="${produit.id}"></td>
            <td class="p-4" th:text="${produit.nom}"></td>
            <td class="p-4" th:text="${#numbers.formatDecimal(produit.pu, 1, 2)}"></td>
            <td class="p-4 text-right space-x-2">
                <a th:href="@{/produits/{id}/modifier(id=${produit.id})}" class="text-brand-success hover:underline text-xs font-medium">Modifier</a>
                <span class="mx-2 text-gray-300">|</span>
                <form th:action="@{/produits/{id}/supprimer(id=${produit.id})}"
                      method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer ce produit ?')">
                    <button type="submit" class="text-red-500 hover:underline text-xs font-medium">Supprimer</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(produits)}">
            <td colspan="4" class="p-4 text-center text-gray-500">Aucun produit ne correspond à ces critères.</td>
        </tr>
    </tbody>
</table>
</div>

<!-- BEGIN: Pagination -->
<div th:if="${totalProduits > 0}" class="flex items-center justify-between mt-4 text-sm text-gray-500">
  <span>
    <span th:text="${totalProduits}"></span> produit(s) &mdash; page <span th:text="${page + 1}"></span> / <span th:text="${totalPages}"></span>
  </span>
  <div class="flex items-center gap-2">
    <a th:if="${page > 0}"
       th:href="@{/produits(nom=${critNom}, puMin=${critPuMin}, puMax=${critPuMax}, tri=${critTri}, direction=${critDirection}, taille=${critTaille}, page=${page - 1})}"
       class="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-100">&larr; Précédent</a>
    <span th:unless="${page > 0}" class="px-3 py-1.5 border border-gray-200 rounded-lg text-gray-300">&larr; Précédent</span>

    <a th:if="${page + 1 < totalPages}"
       th:href="@{/produits(nom=${critNom}, puMin=${critPuMin}, puMax=${critPuMax}, tri=${critTri}, direction=${critDirection}, taille=${critTaille}, page=${page + 1})}"
       class="px-3 py-1.5 border border-gray-300 rounded-lg hover:bg-gray-100">Suivant &rarr;</a>
    <span th:unless="${page + 1 < totalPages}" class="px-3 py-1.5 border border-gray-200 rounded-lg text-gray-300">Suivant &rarr;</span>
  </div>
</div>
<!-- END: Pagination -->

</main>
</body>
</html>
