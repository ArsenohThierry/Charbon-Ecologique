<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des produits</title>
</head>
<body>

<h1>Produits</h1>

<p th:if="${succes}" th:text="${succes}"></p>

<a href="/produits/nouveau">+ Nouveau produit</a>
 
<br><br>

<table border="1" cellpadding="8" cellspacing="0">
    <thead>
        <tr>
            <th>#</th>
            <th>Nom</th>
            <th>Prix unitaire (Ar)</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="produit : ${produits}">
            <td th:text="${produit.id}"></td>
            <td th:text="${produit.nom}"></td>
            <td th:text="${#numbers.formatDecimal(produit.pu, 1, 2)}"></td>
            <td>
                <a th:href="@{/produits/{id}/modifier(id=${produit.id})}">Modifier</a>
                &nbsp;|&nbsp;
                <form th:action="@{/produits/{id}/supprimer(id=${produit.id})}"
                      method="post"
                      style="display:inline"
                      onsubmit="return confirm('Supprimer ce produit ?')">
                    <button type="submit">Supprimer</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(produits)}">
            <td colspan="4">Aucun produit enregistré.</td>
        </tr>
    </tbody>
</table>

</body>
</html>
