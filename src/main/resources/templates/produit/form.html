<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titre} + ' - Charbon Vert'">Produit - Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="../static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="../static/css/fonts.css" />
</head>
<body class="bg-brand-light font-sans text-[#432818] h-screen overflow-hidden flex">
<aside th:replace="~{fragments/sidebar :: sidebar('produits')}"></aside>
<main class="flex-1 overflow-y-auto p-8">

<h1 class="text-3xl font-bold text-brand-dark mb-6" th:text="${titre}">Produit</h1>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-2xl">
<form th:action="${produit.id == null} ? @{/produits/nouveau} : @{/produits/{id}/modifier(id=${produit.id})}"
      th:object="${produit}"
      method="post"
      class="space-y-6">

    <div>
        <label for="nom" class="block text-sm font-semibold text-gray-700 mb-1">Nom :</label>
        <input type="text"
               id="nom"
               name="nom"
               th:value="*{nom}"
               required
               placeholder="Ex : Charbon de bois 5 kg"
               class="w-full h-11 px-4 rounded-lg border-gray-200 focus:ring-brand-success focus:border-brand-success text-sm">
    </div>

    <div>
        <label for="pu" class="block text-sm font-semibold text-gray-700 mb-1">Prix unitaire (Ar) :</label>
        <input type="number"
               id="pu"
               name="pu"
               th:value="*{pu}"
               step="0.01"
               min="0"
               required
               placeholder="Ex : 15000"
               class="w-full h-11 px-4 rounded-lg border-gray-200 focus:ring-brand-success focus:border-brand-success text-sm">
    </div>

    <div class="flex items-center gap-4 pt-4">
        <button type="submit"
                th:text="${produit.id == null} ? 'Créer' : 'Enregistrer les modifications'"
                class="px-8 py-2.5 bg-brand-success text-white rounded-lg font-medium hover:opacity-90 transition-colors text-sm">
            Enregistrer
        </button>
        <a th:href="@{/produits}" class="px-8 py-2.5 rounded-lg border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors text-sm">Annuler</a>
    </div>

</form>
</div>

</main>
</body>
</html>
