<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Fournisseurs - Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="../static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="../static/css/fonts.css" />
</head>

<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex">
    <aside th:replace="~{fragments/sidebar :: sidebar('fournisseurs')}"></aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 px-8 flex items-center justify-between">
            <div>
                <h2 class="text-sm font-bold text-gray-800">Gestionnaire de stock</h2>
                <p class="text-[10px] text-gray-500 uppercase tracking-wide">Approvisionnement, lots &amp; inventaire</p>
            </div>
        </header>

        <section class="flex-1 p-12 overflow-y-auto">
            <div class="max-w-6xl mx-auto">

                <div th:if="${success}" class="mb-6 p-4 bg-green-100 border border-green-200 text-green-800 rounded-lg text-sm font-medium" th:text="${success}"></div>
                <div th:if="${error}" class="mb-6 p-4 bg-red-100 border border-red-200 text-red-800 rounded-lg text-sm font-medium" th:text="${error}"></div>

                <!-- Formulaire -->
                <div class="mb-12">
                    <div class="mb-8">
                        <h1 class="text-4xl font-serif text-brand-dark mb-2" th:text="${fournisseurModel.id != null} ? 'Modifier le fournisseur' : 'Ajouter un fournisseur'">Ajouter un fournisseur</h1>
                        <p class="text-gray-600 text-sm">Enregistrer ou mettre à jour un fournisseur de matières premières.</p>
                    </div>
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
                        <form th:action="@{/fournisseur/add}" th:object="${fournisseurModel}" method="POST" class="space-y-6">
                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" th:field="*{date_creation}" />
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                <div class="space-y-1.5">
                                    <label class="block text-sm font-medium text-gray-700" for="nom">Nom / Raison sociale</label>
                                    <input th:field="*{nom}" th:errorclass="'border-red-500 focus:ring-red-500 focus:border-red-500'" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-gray-700 text-sm focus:ring-1 focus:ring-brand-success focus:border-brand-success" id="nom" type="text" placeholder="Coopérative Andry" />
                                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></p>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-sm font-medium text-gray-700" for="telephone">Téléphone</label>
                                    <input th:field="*{telephone}" th:errorclass="'border-red-500 focus:ring-red-500 focus:border-red-500'" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-gray-700 text-sm focus:ring-1 focus:ring-brand-success focus:border-brand-success" id="telephone" type="text" placeholder="034 12 345 67" />
                                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></p>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-sm font-medium text-gray-700" for="email">Email</label>
                                    <input th:field="*{email}" th:errorclass="'border-red-500 focus:ring-red-500 focus:border-red-500'" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-gray-700 text-sm focus:ring-1 focus:ring-brand-success focus:border-brand-success" id="email" type="email" placeholder="contact@exemple.mg" />
                                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="block text-sm font-medium text-gray-700" for="adresse">Adresse</label>
                                    <input th:field="*{adresse}" th:errorclass="'border-red-500 focus:ring-red-500 focus:border-red-500'" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-gray-700 text-sm focus:ring-1 focus:ring-brand-success focus:border-brand-success" id="adresse" type="text" placeholder="Ambohitrimanjaka" />
                                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('adresse')}" th:errors="*{adresse}"></p>
                                </div>
                                <div class="space-y-1.5 md:col-span-2">
                                    <span class="block text-sm font-medium text-gray-700 md:pt-2">Statut du fournisseur</span>
                                    <div class="flex items-center space-x-6 pt-2">
                                        <label for="statut-actif" class="relative flex items-center cursor-pointer select-none">
                                            <input type="radio" th:field="*{actif}" th:value="true" id="statut-actif" class="w-4 h-4 text-brand-success bg-white border-gray-200 focus:ring-brand-success focus:ring-1 focus:ring-offset-0" />
                                            <span class="ml-2.5 text-sm font-medium text-gray-700">Actif</span>
                                        </label>
                                        <label for="statut-inactif" class="relative flex items-center cursor-pointer select-none">
                                            <input type="radio" th:field="*{actif}" th:value="false" id="statut-inactif" class="w-4 h-4 text-brand-success bg-white border-gray-200 focus:ring-brand-success focus:ring-1 focus:ring-offset-0" />
                                            <span class="ml-2.5 text-sm font-medium text-gray-700">Inactif</span>
                                        </label>
                                    </div>
                                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('actif')}" th:errors="*{actif}"></p>
                                </div>
                            </div>
                            <div class="pt-4 flex items-center gap-4">
                                <button class="bg-brand-success hover:bg-emerald-800 text-white font-semibold py-2 px-6 rounded-lg transition-colors text-sm" type="submit" th:text="${fournisseurModel.id != null} ? 'Enregistrer les modifications' : 'Enregistrer le fournisseur'">Enregistrer le fournisseur</button>
                                <a th:href="@{/fournisseur/home}" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium py-2 px-8 rounded-lg transition-colors text-sm text-center">Annuler</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
