<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erreur - Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="static/css/fonts.css" />
</head>
<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex items-center justify-center p-8">
    <div class="max-w-md w-full text-center">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-brand-dark mb-2">Une erreur est survenue</h1>
        <p class="text-gray-500 mb-8" th:text="${error}">Erreur inconnue</p>
        <a th:href="@{/dashboard}" class="inline-flex items-center px-6 py-2.5 bg-brand-success text-white rounded-lg hover:opacity-90 transition-colors text-sm font-medium">
            Retour au tableau de bord
        </a>
    </div>
</body>
</html>
