<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Erreur - Charbon Vert</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#FFF8F0] text-[#432818] font-sans min-h-screen flex items-center justify-center">
<div class="text-center max-w-md mx-auto p-8">
  <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
    </svg>
  </div>
  <h1 class="text-2xl font-serif font-bold mb-2">Une erreur est survenue</h1>
  <p class="text-gray-600 mb-6" th:text="${error}">Erreur inconnue</p>
  <a href="/dashboard" class="inline-block bg-[#6f1d1b] text-white px-6 py-2.5 rounded-lg font-medium hover:bg-[#99582a] transition-colors">
    Retour au tableau de bord
  </a>
</div>
</body>
</html>
