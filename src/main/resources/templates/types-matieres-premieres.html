<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Types de matières premières</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>Types de matières premières</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Libellé</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${types}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.libelle}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
