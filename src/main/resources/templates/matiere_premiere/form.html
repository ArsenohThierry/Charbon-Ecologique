<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Charbon Vert - Gestionnaire de stock</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="../../static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="../../static/css/fonts.css" />
</head>

<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex">
    <aside th:replace="~{fragments/sidebar :: sidebar('matieres')}"></aside>
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="px-8 py-4 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-brand-dark">Gestionnaire de stock</h2>
                <p class="text-xs text-gray-500">Approvisionnement, lots &amp; inventaire</p>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 lg:px-16">

            <!-- Notifications -->
            <div th:if="${success}"
                class="max-w-5xl mx-auto mb-4 p-4 bg-green-100 border border-green-200 text-green-800 rounded-xl text-sm font-medium"
                th:text="${success}"></div>
            <div th:if="${error}"
                class="max-w-5xl mx-auto mb-4 p-4 bg-red-100 border border-red-200 text-red-800 rounded-xl text-sm font-medium"
                th:text="${error}"></div>

            <!-- Formulaire -->
            <section class="max-w-5xl mx-auto mb-12">
                <div class="text-center mb-8">
                    <h3 class="text-4xl font-bold text-brand-dark mb-2"
                        th:text="${typeMatiere.id != null} ? 'Modifier le type de matière' : 'Nouveaux types de matières premières'">
                        Nouveaux types de matières premières
                    </h3>
                    <p class="text-sm text-gray-600">Saisir le nom, le prix et le fournisseur d'un type de matière
                        première.</p>
                </div>

                <div class="bg-white rounded-2xl border border-gray-200 p-8 shadow-sm">
                    <form th:action="${typeMatiere.id != null} ? @{/matiere/update} : @{/matiere/add}"
                        th:object="${typeMatiere}" method="post" class="space-y-6">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:field="*{reference}" />
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label
                                    class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Libellé
                                    :</label>
                                <input type="text" th:field="*{libelle}"
                                    th:classappend="${#fields.hasErrors('libelle')} ? 'border-red-500 focus:ring-red-200' : 'border-gray-200 focus:ring-brand-light'"
                                    class="w-full px-4 py-2.5 text-sm bg-gray-50/50 border rounded-xl focus:outline-none focus:ring-4 transition-all"
                                    placeholder="Ex: Balle de riz" />
                                <p th:if="${#fields.hasErrors('libelle')}" th:errors="*{libelle}"
                                    class="text-xs text-red-600 mt-1 font-medium"></p>
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Prix
                                    Unitaire (Ar) :</label>
                                <input type="text" th:field="*{prixUnitaire}"
                                    th:classappend="${#fields.hasErrors('prixUnitaire')} ? 'border-red-500 focus:ring-red-200' : 'border-gray-200 focus:ring-brand-light'"
                                    class="w-full px-4 py-2.5 text-sm bg-gray-50/50 border rounded-xl focus:outline-none focus:ring-4 transition-all"
                                    placeholder="Ex: 320.00" />
                                <p th:if="${#fields.hasErrors('prixUnitaire')}" th:errors="*{prixUnitaire}"
                                    class="text-xs text-red-600 mt-1 font-medium"></p>
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Rendement
                                    (ratio) :</label>
                                <input type="text" th:field="*{rendement}"
                                    th:classappend="${#fields.hasErrors('rendement')} ? 'border-red-500 focus:ring-red-200' : 'border-gray-200 focus:ring-brand-light'"
                                    class="w-full px-4 py-2.5 text-sm bg-gray-50/50 border rounded-xl focus:outline-none focus:ring-4 transition-all"
                                    placeholder="Ex: 0.40" />
                                <p th:if="${#fields.hasErrors('rendement')}" th:errors="*{rendement}"
                                    class="text-xs text-red-600 mt-1 font-medium"></p>
                            </div>
                        </div>
                        <div>
                            <label
                                class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-2">Fournisseur
                                :</label>
                            <select name="id_fournisseur"
                                th:classappend="${#fields.hasErrors('fournisseur')} ? 'border-red-500 focus:ring-red-200' : 'border-gray-200 focus:ring-brand-light'"
                                class="w-full md:w-1/3 px-4 py-2.5 text-sm bg-gray-50/50 border rounded-xl focus:outline-none focus:ring-4 transition-all appearance-none">
                                <option value="">-- Choisir un fournisseur --</option>
                                <option th:each="f : ${listeFournisseurs}" th:value="${f.id}"
                                    th:text="|#${f.id} - ${f.nom}|"
                                    th:selected="${typeMatiere.fournisseur != null && typeMatiere.fournisseur.id == f.id}">
                                </option>
                            </select>
                            <p th:if="${#fields.hasErrors('fournisseur')}" th:errors="*{fournisseur}"
                                class="text-xs text-red-600 mt-1 font-medium"></p>
                        </div>
                        <div class="flex justify-end pt-4 space-x-3">
                            <a th:href="@{/matiere/home}"
                                class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">Annuler</a>
                            <button type="submit"
                                class="px-5 py-2.5 text-white font-semibold bg-brand-success hover:bg-slate-900 rounded-xl transition-colors shadow-sm">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
</body>

</html>
