<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Connexion | Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="../static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="../static/css/fonts.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input:focus {
            outline: none !important;
            border-color: #407B4A !important;
            box-shadow: 0 0 0 1px #407B4A !important;
        }
    </style>
</head>

<body class="bg-brand-light min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-[420px]">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-10">
            <!-- Brand -->
            <div class="flex flex-col items-center mb-10">
                <div class="w-16 h-16 bg-brand-dark rounded-full flex items-center justify-center mb-6">
                    <svg class="h-8 w-8 text-brand-accent" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M21 12c0 1.2-4.03 6-9 6s-9-4.8-9-6c0-1.2 4.03-6 9-6s9 4.8 9 6z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        <path d="M12 18V6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>
                <h1 class="font-serif text-2xl text-brand-dark font-bold mb-1">Charbon Vert</h1>
                <p class="text-sm text-gray-500">Gestionnaire de stock</p>
            </div>

            <!-- Error -->
            <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6">
                <span th:text="${error}">Erreur</span>
            </div>

            <!-- Form -->
            <form th:action="@{/login}" method="post" class="space-y-5" id="login-form">
                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-gray-700" for="username">Identifiant</label>
                    <input
                        class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-gray-700 text-sm"
                        id="username" name="username" required="" type="text" placeholder="Votre identifiant" />
                </div>
                <div class="space-y-1.5">
                    <label class="block text-sm font-medium text-gray-700" for="password">Mot de passe</label>
                    <div class="relative">
                        <input
                            class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 pr-12 text-gray-700 text-sm"
                            id="password" name="password" required="" type="password" placeholder="Votre mot de passe" />
                        <button
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 cursor-pointer p-1"
                            id="toggle-password" type="button">
                            <svg class="w-5 h-5" id="password-icon" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="pt-2">
                    <button
                        class="w-full h-12 bg-brand-success hover:bg-emerald-800 text-white font-semibold rounded-lg transition-all text-sm"
                        type="submit">
                        Se connecter
                    </button>
                </div>
            </form>

            <div class="mt-10 pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">
                    Propulsé par le système de gestion de production durable.<br />
                    <span class="text-[10px] opacity-50 mt-1 block">v2.4.0-STABLE</span>
                </p>
            </div>
        </div>
    </main>

    <script>
        const toggleBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('password-icon');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            icon.innerHTML = type === 'password'
                ? '<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>'
                : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-4.477 0-8.268-2.943-9.542-7a10.102 10.102 0 012.602-3.94" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M9.9 4.24A9.12 9.12 0 0112 4c4.477 0 8.268 2.943 9.542 7a10.102 10.102 0 01-2.602 3.94" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>';
        });

        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', () => {
            const btn = loginForm.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            btn.classList.add('opacity-80');
        });
    </script>
</body>

</html>
