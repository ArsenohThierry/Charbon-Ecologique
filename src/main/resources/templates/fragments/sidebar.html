<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="sidebar(activePage)" class="w-64 bg-brand-dark text-white flex flex-col shrink-0">
    <div class="p-6 flex items-center gap-3">
        <div class="w-8 h-8 bg-brand-accent rounded-full flex items-center justify-center">
            <svg class="h-5 w-5 text-brand-dark" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 12c0 1.2-4.03 6-9 6s-9-4.8-9-6c0-1.2 4.03-6 9-6s9 4.8 9 6z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                <path d="M12 18V6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
        </div>
        <div>
            <h1 class="font-bold text-lg leading-tight">Charbon Vert</h1>
            <p class="text-xs text-gray-400">Gestionnaire de stock</p>
        </div>
    </div>
    <nav class="flex-1 px-4 mt-4 space-y-1 overflow-y-auto custom-scrollbar">
        <!-- Tableau de bord -->
        <a th:classappend="${activePage == 'dashboard'} ? 'bg-brand-accent text-brand-dark font-medium' : 'text-gray-300 hover:bg-white/10'"
        class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors"
        th:href="@{/dashboard}">
        <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
        </svg>
            Tableau de bord
        </a>
        <!-- Approvisionnement & mat. -->
        <div>
            <button th:classappend="${activePage == 'matieres' or activePage == 'fournisseurs'} ? 'text-brand-accent' : 'text-gray-300'"
            class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-white/10 rounded-md transition-colors dropdown-btn">
            <span class="flex items-center gap-3">
                    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                    </svg>
                    Approvisionnement &amp; mat.
                </span>
                <svg class="h-4 w-4 transition-transform dropdown-chevron" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                    <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                </svg>
            </button>
            <div class="mt-1 ml-4 space-y-1 dropdown-content hidden">
                <a th:classappend="${activePage == 'matieres'} ? 'bg-brand-accent text-brand-dark font-medium rounded-md' : 'text-gray-400 hover:text-white'"
                class="block px-3 py-2 text-xs transition-colors rounded-md"
                th:href="@{/matiere/home}">Types de matières</a>
                <a th:classappend="${activePage == 'fournisseurs'} ? 'bg-brand-accent text-brand-dark font-medium rounded-md' : 'text-gray-400 hover:text-white'"
                   class="block px-3 py-2 text-xs transition-colors rounded-md"
                   th:href="@{/fournisseur/home}">Fournisseurs</a>
            </div>
        </div>
        <!-- Produits finis -->
        <a th:classappend="${activePage == 'produits'} ? 'bg-brand-accent text-brand-dark font-medium' : 'text-gray-300 hover:bg-white/10'"
           class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors"
           th:href="@{/produits}">
            <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
            Produits finis
        </a>
        <!-- Lots de production -->
        <a th:classappend="${activePage == 'lots'} ? 'bg-brand-accent text-brand-dark font-medium' : 'text-gray-300 hover:bg-white/10'"
        class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors"
        th:href="@{/stock/lot/liste}">
            <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
            Lots de production
        </a>
        <!-- Généralités stocks -->
        <div>
            <button th:classappend="${activePage == 'entree-stock' or activePage == 'sortie-stock'} ? 'text-brand-accent' : 'text-gray-300'"
                    class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-white/10 rounded-md transition-colors dropdown-btn">
                <span class="flex items-center gap-3">
                    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                    </svg>
                    Généralités stocks
                </span>
                <svg class="h-4 w-4 transition-transform dropdown-chevron" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                    <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                </svg>
            </button>
            <div class="mt-1 ml-4 space-y-1 dropdown-content hidden">
                <a th:classappend="${activePage == 'entree-stock'} ? 'bg-brand-accent text-brand-dark font-medium rounded-md' : 'text-gray-400 hover:text-white'"
                   class="block px-3 py-2 text-xs transition-colors rounded-md"
                   th:href="@{/stock/entree}">Entrée stock</a>
                <a th:classappend="${activePage == 'sortie-stock'} ? 'bg-brand-accent text-brand-dark font-medium rounded-md' : 'text-gray-400 hover:text-white'"
                   class="block px-3 py-2 text-xs transition-colors rounded-md"
                   th:href="@{/stock/sortie}">Sortie stock</a>
            </div>
        </div>
        <!-- Commandes -->
        <a th:classappend="${activePage == 'commandes'} ? 'bg-brand-accent text-brand-dark font-medium' : 'text-gray-300 hover:bg-white/10'"
           class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors"
           th:href="@{/cmd}">
            <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
            Commandes
        </a>
        <!-- Livraisons -->
        <a th:classappend="${activePage == 'livraisons'} ? 'bg-brand-accent text-brand-dark font-medium' : 'text-gray-300 hover:bg-white/10'"
           class="flex items-center gap-3 px-3 py-2 text-sm rounded-md transition-colors"
           th:href="@{/livraisons}">
            <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
            Livraisons
        </a>
        <!-- Rapports -->
        <a class="flex items-center gap-3 px-3 py-2 text-sm text-gray-300 hover:bg-white/10 rounded-md transition-colors" href="#">
            <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
            Rapports
        </a>
    </nav>
    <div class="p-4 border-t border-white/10">
        <a th:href="@{/logout}" class="flex items-center gap-2 text-xs text-gray-400 hover:text-white transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
            Déconnexion
        </a>
    </div>
    <script>
        document.querySelectorAll('.dropdown-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var content = this.nextElementSibling;
                var chevron = this.querySelector('.dropdown-chevron');
                content.classList.toggle('hidden');
                chevron.classList.toggle('-rotate-180');
            });
        });
        document.querySelectorAll('.dropdown-content').forEach(function(content) {
            if (content.querySelector('.bg-brand-accent')) {
                content.classList.remove('hidden');
                content.previousElementSibling.querySelector('.dropdown-chevron').classList.add('-rotate-180');
            }
        });
    </script>
</aside>
</html>
