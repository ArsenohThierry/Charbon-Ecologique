<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <title>Modifier un mouvement - Charbon Vert</title>
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <link rel="stylesheet" th:href="@{/css/fonts.css}" />
</head>

<body class="bg-brand-light font-sans text-slate-800 h-screen overflow-hidden flex">
  <aside th:replace="~{fragments/sidebar :: sidebar('etat-stock')}"></aside>
  <main class="flex-1 overflow-y-auto p-8">

    <h2 class="text-2xl font-bold text-brand-dark mb-6">Modifier le mouvement</h2>

     <div th:if="${error}" class="mb-6 p-4 bg-red-100 border border-red-200 text-red-800 rounded-lg text-sm font-medium"
      th:text="${error}"></div>

    <section class="bg-white rounded-xl border border-gray-100 shadow-sm p-8 max-w-2xl">
      <form th:action="@{/stock/mouvement/modifier}" method="post" th:object="${mouvementEdit}" class="space-y-6">

        <input type="hidden" th:field="*{id}" />

        <!-- Lot (uniquement pour une entrée) -->
        <div th:if="${mouvement.typeMouvement.id == 1}">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Lot de production</label>
          <p th:if="${#fields.hasErrors('idLot')}" th:errors="*{idLot}" class="text-red-600 text-xs font-medium mb-1">
          </p>
          <select th:field="*{idLot}" class="w-full h-11 px-4 rounded-lg border-gray-200 text-sm">
            <option value="">Sélectionner un lot...</option>
            <option th:each="lot : ${lotsTermines}" th:value="${lot.id}"
              th:text="${lot.reference} + ' — ' + ${lot.quantiteMatiereUtilisee} + ' kg'"></option>
          </select>
        </div>

        <!-- Quantité (toujours affiché) -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Quantité (unités)</label>
          <p th:if="${#fields.hasErrors('quantite')}" th:errors="*{quantite}"
            class="text-red-600 text-xs font-medium mb-1"></p>
          <input th:field="*{quantite}" type="number"
            class="w-full h-11 px-4 rounded-lg border-gray-200 text-sm" />
        </div>

        <!-- Motif (uniquement pour une sortie) -->
        <div th:if="${mouvement.typeMouvement.id == 2}">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Motif</label>
          <p th:if="${#fields.hasErrors('idMotif')}" th:errors="*{idMotif}"
            class="text-red-600 text-xs font-medium mb-1"></p>
          <select th:field="*{idMotif}" class="w-full h-11 px-4 rounded-lg border-gray-200 text-sm">
            <option value="">Sélectionner...</option>
            <option th:each="motif : ${motifs}" th:value="${motif.id}" th:text="${motif.libelle}"></option>
          </select>
        </div>

        <!-- Date (toujours affiché) -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Date</label>
          <p th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="text-red-600 text-xs font-medium mb-1"></p>
          <input th:field="*{date}" type="date" class="w-full h-11 px-4 rounded-lg border-gray-200 text-sm" />
        </div>

        <div class="flex items-center gap-4 pt-4">
          <button type="submit"
            class="bg-brand-success hover:bg-brand-dark text-white px-8 py-2.5 rounded-lg font-medium">
            Enregistrer les modifications
          </button>
          <a th:href="@{/stock/entree}" th:if="${mouvement.typeMouvement.id == 1}"
            class="px-8 py-2.5 rounded-lg border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">
            Annuler
          </a>
          <a th:href="@{/stock/sortie}" th:if="${mouvement.typeMouvement.id == 2}"
            class="px-8 py-2.5 rounded-lg border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">
            Annuler
          </a>
        </div>

      </form>
    </section>

  </main>
</body>

</html>
