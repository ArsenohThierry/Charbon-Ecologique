<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modifier mouvement - Charbon Vert</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'forest-green': '#14301d',
            'leaf-green': '#3d6e42',
            'moss-green': '#2d4d35',
            'gold-accent': '#d4a056',
            'sand-bg': '#fcfcf9',
          },
          fontFamily: {
            serif: ['"Libre Caslon Text"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
</script>
</head>
<body class="bg-sand-bg text-forest-green font-sans min-h-screen flex">

<!-- BEGIN: Sidebar -->
<aside class="w-64 bg-forest-green text-white flex flex-col fixed inset-y-0 left-0 z-50">
  <div class="p-6 flex items-center gap-3">
    <div class="w-10 h-10 bg-gold-accent rounded-full flex items-center justify-center">
      <span class="text-forest-green font-bold text-xl">C</span>
    </div>
    <div>
      <h1 class="font-serif font-bold text-lg leading-tight">Charbon Vert</h1>
      <p class="text-xs text-gray-400">Gestionnaire de stock</p>
    </div>
  </div>
  <nav class="flex-1 px-4 py-4 space-y-2 overflow-y-auto no-scrollbar">
    <a class="flex items-center gap-3 px-4 py-2 text-sm text-gray-300 hover:bg-moss-green rounded-lg transition-colors" href="#">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
      Tableau de bord
    </a>
    <div data-purpose="sidebar-dropdown">
      <button class="w-full flex items-center justify-between px-4 py-2 text-sm text-gray-300 hover:bg-moss-green rounded-lg transition-colors group">
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Approvisionnement
        </div>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
      </button>
    </div>
    <div data-purpose="sidebar-dropdown">
      <button class="w-full flex items-center justify-between px-4 py-2 text-sm text-gray-300 hover:bg-moss-green rounded-lg transition-colors">
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Lots de production
        </div>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
      </button>
    </div>
    <div data-purpose="sidebar-dropdown">
      <button class="w-full flex items-center justify-between px-4 py-2 text-sm text-white bg-moss-green rounded-lg">
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M3 7a2 2 0 012-2h14a2 2 0 012 2M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Généralités stocks
        </div>
        <svg class="w-4 h-4 rotate-180 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
      </button>
      <div class="ml-9 mt-1 space-y-1">
        <a class="block px-4 py-1.5 text-xs text-gray-400 hover:text-white" href="#">État du stock</a>
        <a class="block px-4 py-1.5 text-xs text-gray-400 hover:text-white" th:href="@{/stock/entree}">Entrée de stock</a>
        <a class="block px-4 py-1.5 text-xs text-gray-400 hover:text-white" th:href="@{/stock/sortie}">Sortie de stock</a>
      </div>
    </div>
  </nav>
</aside>
<!-- END: Sidebar -->

<!-- BEGIN: Main Content -->
<main class="flex-1 ml-64 p-8">
  <header class="flex justify-between items-start mb-10">
    <div>
      <h2 class="text-2xl font-serif font-bold text-forest-green">Gestionnaire de stock</h2>
      <p class="text-sm text-gray-500">Modification d'un mouvement</p>
    </div>
  </header>

  <section class="mb-10">
    <h3 class="text-3xl font-serif font-bold mb-1">
      Modifier <span th:text="${mouvement.typeMouvement.libelle == 'Entree' ? 'une entrée' : 'une sortie'}"></span>
    </h3>
    <p class="text-gray-500 text-sm italic">Mettez à jour les informations du mouvement.</p>
  </section>

  <section class="bg-white rounded-xl border border-gray-100 shadow-sm p-8 mb-12">
    <form th:action="@{/stock/mouvement/modifier}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">

      <input type="hidden" name="id" th:value="${mouvement.id}"/>

      <!-- Lot de production (entree only) -->
      <div class="space-y-1.5" th:if="${mouvement.typeMouvement.libelle == 'Entree'}">
        <label class="block text-sm font-semibold text-gray-700">Lot de production</label>
        <select name="idLot" class="w-full h-11 px-4 rounded-lg border-gray-200 focus:ring-leaf-green focus:border-leaf-green text-sm">
          <option th:each="lot : ${lots}"
                  th:value="${lot.id}"
                  th:text="${lot.reference} + ' — ' + ${lot.quantiteMatiereUtilisee} + ' kg'"
                  th:selected="${lot.id == mouvement.lotProduction?.id}">
          </option>
        </select>
      </div>

      <!-- Quantité -->
      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700">Quantité (unités)</label>
        <input name="quantite" type="number" th:value="${mouvement.quantite}"
               class="w-full h-11 px-4 rounded-lg border-gray-200 focus:ring-leaf-green focus:border-leaf-green text-sm"/>
      </div>

      <!-- Motif (sortie only) -->
      <div class="space-y-1.5" th:if="${mouvement.typeMouvement.libelle == 'Sortie'}">
        <label class="block text-sm font-semibold text-gray-700">Motif</label>
        <select name="idMotif" class="w-full h-11 px-4 rounded-lg border-gray-200 focus:ring-leaf-green focus:border-leaf-green text-sm">
          <option th:each="motif : ${motifs}"
                  th:value="${motif.id}"
                  th:text="${motif.libelle}"
                  th:selected="${motif.id == mouvement.motifSortie?.id}">
          </option>
        </select>
      </div>

      <!-- Date -->
      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700">Date</label>
        <input name="date" type="date"
               th:value="${#temporals.format(mouvement.dateMouvement, 'yyyy-MM-dd')}"
               class="w-full h-11 px-4 rounded-lg border-gray-200 focus:ring-leaf-green focus:border-leaf-green text-sm"/>
      </div>

      <!-- Boutons -->
      <div class="md:col-span-2 pt-4 flex items-center gap-4">
        <button type="submit"
                class="bg-leaf-green hover:bg-forest-green text-white px-8 py-2.5 rounded-lg font-medium transition-colors text-sm">
          Enregistrer les modifications
        </button>
        <a th:if="${mouvement.typeMouvement.libelle == 'Entree'}" th:href="@{/stock/entree}"
           class="px-8 py-2.5 rounded-lg border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors text-sm">
          Annuler
        </a>
        <a th:if="${mouvement.typeMouvement.libelle == 'Sortie'}" th:href="@{/stock/sortie}"
           class="px-8 py-2.5 rounded-lg border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors text-sm">
          Annuler
        </a>
      </div>

    </form>
  </section>
</main>

</body>
</html>
