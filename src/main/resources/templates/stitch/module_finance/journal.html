<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Journal Financier - Charbon Vert</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { dark: '#1B331C', accent: '#C79E5C', light: '#F8F7F0', success: '#407B4A' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    </style>
</head>
<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex">

<!-- ===== SIDEBAR ===== -->
<aside class="w-64 bg-brand-dark text-white flex flex-col shrink-0 fixed h-full overflow-y-auto custom-scrollbar">
    <div class="p-6 flex items-center gap-3">
        <div class="w-9 h-9 bg-brand-accent rounded-full flex items-center justify-center">
            <svg class="h-5 w-5 text-brand-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <div>
            <h1 class="font-bold text-lg leading-tight">Charbon Vert</h1>
            <p class="text-xs text-gray-400">Module Financier</p>
        </div>
    </div>
    <nav class="flex-1 px-4 mt-2 space-y-1">
        <a href="/finance/kpi"        class="flex items-center gap-3 px-3 py-2 text-sm text-gray-300 hover:bg-white/10 rounded-md transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            KPI &amp; Dashboard
        </a>
        <a href="/finance/journal"    class="flex items-center gap-3 px-3 py-2 text-sm text-white bg-white/15 rounded-md">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Journal Financier
        </a>
        <a href="/finance/bilan"      class="flex items-center gap-3 px-3 py-2 text-sm text-gray-300 hover:bg-white/10 rounded-md transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Bilan
        </a>
        <a href="/finance/tresorerie" class="flex items-center gap-3 px-3 py-2 text-sm text-gray-300 hover:bg-white/10 rounded-md transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            Trésorerie
        </a>
    </nav>
    <div class="p-4 border-t border-white/10">
        <a href="/dashboard" class="flex items-center gap-2 text-xs text-gray-400 hover:text-white transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Retour au tableau de bord
        </a>
    </div>
</aside>

<!-- ===== CONTENU PRINCIPAL ===== -->
<main class="flex-1 ml-64 p-8">

    <!-- En-tête -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Journal Financier</h1>
            <p class="text-sm text-slate-500 mt-1">Toutes les écritures comptables</p>
        </div>
        <a href="/finance/journal/export-csv"
           class="inline-flex items-center gap-2 px-4 py-2 bg-brand-success text-white text-sm font-medium rounded-lg hover:bg-green-700 transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Exporter CSV
        </a>
    </div>

    <!-- Filtres -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5 mb-6">
        <form method="get" action="/finance/journal" class="flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Début</label>
                <input type="datetime-local" name="debut" th:value="${debut}" id="filtreDebut"
                       class="px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-success focus:outline-none"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Fin</label>
                <input type="datetime-local" name="fin" th:value="${fin}" id="filtreFin"
                       class="px-3 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-success focus:outline-none"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Type</label>
                <select name="typeJournalId" id="filtreType" class="px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none">
                    <option value="">Tous les types</option>
                    <option th:each="t : ${typesJournal}" th:value="${t.id}" th:text="${t.libelle}"
                            th:selected="${t.id == typeJournalId}"></option>
                </select>
            </div>
            <button type="submit" id="btnFiltrer" class="px-4 py-2 bg-brand-dark text-white text-sm rounded-lg hover:bg-green-900 transition-colors">
                Filtrer
            </button>
            <a href="/finance/journal" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-900 transition-colors">
                Réinitialiser
            </a>
        </form>
    </div>

    <!-- Formulaire ajout écriture -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-5 mb-6">
        <h2 class="text-base font-semibold text-slate-800 mb-4">Nouvelle écriture</h2>
        <form method="post" action="/finance/journal" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Date *</label>
                <input type="datetime-local" name="dateOperation" id="dateOperation" required
                       class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-success"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Type *</label>
                <select name="typeJournalId" id="typeJournalId" required
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none">
                    <option th:each="t : ${typesJournal}" th:value="${t.id}" th:text="${t.libelle}"></option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Origine</label>
                <select name="origineId" id="origineId"
                        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none">
                    <option value="">— aucune —</option>
                    <option th:each="o : ${origines}" th:value="${o.id}" th:text="${o.libelle}"></option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Debit (MGA)</label>
                <input type="number" name="debit" id="debit" step="0.01" min="0" value="0"
                       class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-success"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Credit (MGA)</label>
                <input type="number" name="credit" id="credit" step="0.01" min="0" value="0"
                       class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-success"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Référence</label>
                <input type="text" name="reference" id="reference" maxlength="50"
                       class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none"/>
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-medium text-slate-500 mb-1">Description</label>
                <input type="text" name="description" id="description"
                       class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none"/>
            </div>
            <div class="flex items-end">
                <button type="submit" id="btnEnregistrer"
                        class="w-full px-4 py-2 bg-brand-accent text-brand-dark font-semibold text-sm rounded-lg hover:opacity-90 transition-opacity">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>

    <!-- Tableau des écritures -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h2 class="font-semibold text-slate-800">Écritures</h2>
            <span class="text-xs text-slate-400" th:text="${#lists.size(ecritures)} + ' écriture(s)'"></span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wide">
                    <tr>
                        <th class="px-6 py-3 text-left">Date</th>
                        <th class="px-6 py-3 text-left">Type</th>
                        <th class="px-6 py-3 text-left">Origine</th>
                        <th class="px-6 py-3 text-left">Référence</th>
                        <th class="px-6 py-3 text-right">Debit</th>
                        <th class="px-6 py-3 text-right">Credit</th>
                        <th class="px-6 py-3 text-left">Description</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="e : ${ecritures}"
                        class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-3 text-slate-600 whitespace-nowrap"
                            th:text="${#temporals.format(e.dateOperation,'dd/MM/yyyy HH:mm')}"></td>
                        <td class="px-6 py-3">
                            <span class="px-2 py-0.5 rounded text-xs font-medium"
                                  th:classappend="${e.typeJournal.code == 'VTE' || e.typeJournal.code == 'VENTE'} ? 'bg-green-100 text-green-700' :
                                                  (${e.typeJournal.code == 'ACH' || e.typeJournal.code == 'ACHAT'} ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700')"
                                  th:text="${e.typeJournal.libelle}"></span>
                        </td>
                        <td class="px-6 py-3 text-slate-600" th:text="${e.origine != null ? e.origine.libelle : '—'}"></td>
                        <td class="px-6 py-3 text-slate-500 font-mono text-xs" th:text="${e.reference != null ? e.reference : '—'}"></td>
                        <td class="px-6 py-3 text-right font-semibold text-green-600"
                            th:text="${#numbers.formatDecimal(e.debit, 1, 'COMMA', 0, 'POINT')} + ' MGA'"></td>
                        <td class="px-6 py-3 text-right font-semibold text-red-600"
                            th:text="${#numbers.formatDecimal(e.credit, 1, 'COMMA', 0, 'POINT')} + ' MGA'"></td>
                        <td class="px-6 py-3 text-slate-500 max-w-xs truncate" th:text="${e.description != null ? e.description : ''}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ecritures)}">
                        <td colspan="7" class="px-6 py-12 text-center text-slate-400">Aucune écriture trouvée.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
