<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Journal Financier - Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" />
</head>
<body class="bg-brand-light font-sans text-[#432818] h-screen overflow-hidden flex">

<aside th:replace="~{fragments/sidebar :: sidebar('journal')}"></aside>
<main class="flex-1 overflow-y-auto p-8">

    <!-- En-tête -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-[#432818]">Journal Financier</h1>
            <p class="text-sm text-[#6b7280] mt-1">Toutes les écritures comptables</p>
        </div>
        <a href="/finance/journal/export-csv"
           class="inline-flex items-center gap-2 px-4 py-2 bg-brand-success text-white text-sm font-medium rounded-lg hover:bg-amber-700 transition-colors">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Exporter CSV
        </a>
    </div>

    <!-- Filtres -->
    <div class="bg-white rounded-xl shadow-sm border border-amber-100 p-5 mb-6">
        <form method="get" action="/finance/journal" class="flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Début</label>
                <input type="datetime-local" name="debut" th:value="${debut}" id="filtreDebut"
                       class="px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:ring-2 focus:ring-brand-success focus:outline-none"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Fin</label>
                <input type="datetime-local" name="fin" th:value="${fin}" id="filtreFin"
                       class="px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:ring-2 focus:ring-brand-success focus:outline-none"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Type</label>
                <select name="typeJournalId" id="filtreType" class="px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none">
                    <option value="">Tous les types</option>
                    <option th:each="t : ${typesJournal}" th:value="${t.id}" th:text="${t.libelle}"
                            th:selected="${t.id == typeJournalId}"></option>
                </select>
            </div>
            <button type="submit" id="btnFiltrer"
                    class="px-4 py-2 bg-brand-dark text-white text-sm rounded-lg hover:bg-amber-900 transition-colors">
                Filtrer
            </button>
            <a href="/finance/journal" class="px-4 py-2 text-sm text-[#5e5e5e] hover:text-[#432818] transition-colors">
                Réinitialiser
            </a>
        </form>
    </div>

    <!-- Formulaire ajout écriture -->
    <div class="bg-white rounded-xl shadow-sm border border-amber-100 p-5 mb-6">
        <h2 class="text-base font-semibold text-[#432818] mb-4">Nouvelle écriture</h2>
        <form method="post" action="/finance/journal" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Date *</label>
                <input type="datetime-local" name="dateOperation" id="dateOperation" required
                       class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-success"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Type *</label>
                <select name="typeJournalId" id="typeJournalId" required
                        class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none">
                    <option th:each="t : ${typesJournal}" th:value="${t.id}" th:text="${t.libelle}"></option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Origine</label>
                <select name="origineId" id="origineId"
                        class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none">
                    <option value="">— aucune —</option>
                    <option th:each="o : ${origines}" th:value="${o.id}" th:text="${o.libelle}"></option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Debit (MGA)</label>
                <input type="number" name="debit" id="debit" step="0.01" min="0" value="0"
                       class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-success"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Credit (MGA)</label>
                <input type="number" name="credit" id="credit" step="0.01" min="0" value="0"
                       class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-success"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Référence</label>
                <input type="text" name="reference" id="reference" maxlength="50"
                       class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none"/>
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-medium text-[#6b7280] mb-1">Description</label>
                <input type="text" name="description" id="description"
                       class="w-full px-3 py-2 text-sm border border-[#e5e3d8] rounded-lg focus:outline-none"/>
            </div>
            <div class="flex items-end">
                <button type="submit" id="btnEnregistrer"
                        class="w-full px-4 py-2 bg-brand-accent text-brand-dark font-semibold text-sm rounded-lg hover:opacity-90 transition-opacity">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>

    <!-- Tableau des écritures -->
    <div class="bg-white rounded-xl shadow-sm border border-amber-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-amber-100 flex items-center justify-between">
            <h2 class="font-semibold text-[#432818]">Écritures</h2>
            <span class="text-xs text-[#9ca3af]" th:text="${#lists.size(ecritures)} + ' écriture(s)'"></span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-amber-50 text-xs text-[#6b7280] uppercase tracking-wide">
                    <tr>
                        <th class="px-6 py-3 text-left">Date</th>
                        <th class="px-6 py-3 text-left">Type</th>
                        <th class="px-6 py-3 text-left">Origine</th>
                        <th class="px-6 py-3 text-left">Référence</th>
                        <th class="px-6 py-3 text-right">Debit</th>
                        <th class="px-6 py-3 text-right">Credit</th>
                        <th class="px-6 py-3 text-left">Description</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-amber-100">
                    <tr th:each="e : ${ecritures}"
                        class="hover:bg-amber-50 transition-colors">
                        <td class="px-6 py-3 text-[#5e5e5e] whitespace-nowrap"
                            th:text="${#temporals.format(e.dateOperation,'dd/MM/yyyy HH:mm')}"></td>
                        <td class="px-6 py-3">
                            <span class="px-2 py-0.5 rounded text-xs font-medium"
                                  th:classappend="${e.typeJournal.code == 'VTE' || e.typeJournal.code == 'VENTE'} ? 'bg-amber-100 text-amber-700' :
                                                  (${e.typeJournal.code == 'ACH' || e.typeJournal.code == 'ACHAT'} ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700')"
                                  th:text="${e.typeJournal.libelle}"></span>
                        </td>
                        <td class="px-6 py-3 text-[#5e5e5e]" th:text="${e.origine != null ? e.origine.libelle : '—'}"></td>
                        <td class="px-6 py-3 text-[#6b7280] font-mono text-xs" th:text="${e.reference != null ? e.reference : '—'}"></td>
                        <td class="px-6 py-3 text-right font-semibold text-amber-600"
                            th:text="${#numbers.formatDecimal(e.debit, 1, 'COMMA', 0, 'POINT')} + ' MGA'"></td>
                        <td class="px-6 py-3 text-right font-semibold text-red-600"
                            th:text="${#numbers.formatDecimal(e.credit, 1, 'COMMA', 0, 'POINT')} + ' MGA'"></td>
                        <td class="px-6 py-3 text-[#6b7280] max-w-xs truncate" th:text="${e.description != null ? e.description : ''}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ecritures)}">
                        <td colspan="7" class="px-6 py-12 text-center text-[#9ca3af]">Aucune écriture trouvée.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div
                class="flex flex-col sm:flex-row justify-between items-center gap-4 p-4 border-t border-amber-100 bg-white rounded-b-2xl">
                <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto text-center sm:text-left">
                    <span class="text-xs text-[#6b7280]">
                        Affichage des éléments de la page <strong class="text-[#432818]"
                            th:text="${page.number + 1}">1</strong>
                    </span>

                    <div class="flex items-center gap-2">
                        <label for="limitSelect" class="text-xs text-[#9ca3af]">Afficher par :</label>
                        <select id="limitSelect"
                            class="bg-amber-50 border border-[#e5e3d8] text-[#432818] text-xs rounded-lg focus:ring-amber-500 focus:border-amber-500 p-1.5 font-medium cursor-pointer transition">
                            <option value="5" th:selected="${page.size == 5}">5</option>
                            <option value="10" th:selected="${page.size == 10}">10</option>
                            <option value="25" th:selected="${page.size == 25}">25</option>
                            <option value="50" th:selected="${page.size == 50}">50</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button type="button" th:data-page="${page.number}" th:disabled="${!page.hasPrevious()}"
                        class="page-btn inline-flex items-center gap-1.5 px-4 py-2 rounded-lg border text-xs font-medium bg-white text-[#432818] shadow-sm transition hover:bg-amber-50 disabled:opacity-40 disabled:pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                        </svg>
                        Précédent
                    </button>

                    <span
                        class="inline-flex items-center justify-center px-3 py-1.5 rounded-md bg-amber-50 text-[#432818] font-semibold text-xs">
                        Page <span class="ml-1" th:text="${page.number + 1}">1</span>
                    </span>

                    <button type="button" th:data-page="${page.number + 2}" th:disabled="${!page.hasNext()}"
                        class="page-btn inline-flex items-center gap-1.5 px-4 py-2 rounded-lg border text-xs font-medium bg-white text-[#432818] shadow-sm transition hover:bg-amber-50 disabled:opacity-40 disabled:pointer-events-none">
                        Suivant
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="flex justify-end gap-3 p-4 border-t border-amber-100">
    
                <a href="/finance/journal/export-excel"
                class="inline-flex items-center gap-2 px-4 py-2 bg-brand-success text-white text-sm font-medium rounded-lg hover:bg-amber-700 transition-colors">
                    
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>

                    Exporter Excel
                </a>

            </div>

    <script>
        document.getElementById("limitSelect").addEventListener("change", function () {
            const limit = this.value;
            const url = new URL(window.location.href);

            url.searchParams.set("limit", limit);
            url.searchParams.set("page", 1);

            window.location.href = url.toString();
        });
    </script>
</main>
</body>
</html>
