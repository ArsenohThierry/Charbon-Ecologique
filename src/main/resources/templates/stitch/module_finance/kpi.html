<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KPI Financiers - Charbon Vert</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .kpi-card { transition: transform .15s ease, box-shadow .15s ease; }
        .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,.10); }
    </style>
</head>
<body class="bg-brand-light font-sans text-slate-800 h-screen overflow-hidden flex">

<aside th:replace="~{fragments/sidebar :: sidebar('indicateurs')}"></aside>
<main class="flex-1 overflow-y-auto p-8">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Tableau de Bord KPI</h1>
        <p class="text-sm text-slate-500 mt-1">Indicateurs financiers clés — Mois en cours</p>
    </div>
    <!--filtre mois annee kpi-->
    <!-- FILTRE KPI -->
<div class="mb-8 bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex flex-wrap gap-3 items-center">

    <!-- Mois -->
    <div>
        <label class="text-xs text-slate-500">Mois</label>
        <select id="moisFilter"
                class="block w-40 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent">
            <option value="1">Janvier</option>
            <option value="2">Février</option>
            <option value="3">Mars</option>
            <option value="4">Avril</option>
            <option value="5">Mai</option>
            <option value="6">Juin</option>
            <option value="7">Juillet</option>
            <option value="8">Août</option>
            <option value="9">Septembre</option>
            <option value="10">Octobre</option>
            <option value="11">Novembre</option>
            <option value="12">Décembre</option>
        </select>
    </div>

    <!-- Année -->
    <div>
        <label class="text-xs text-slate-500">Année</label>
        <select id="anneeFilter"
                class="block w-32 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
        </select>
    </div>

    <!-- Bouton -->
    <div class="self-end">
        <button id="applyFilter"
                class="bg-brand-dark text-white px-5 py-2 rounded-lg text-sm hover:bg-opacity-90 transition">
            Filtrer
        </button>
    </div>

</div>
    <!-- KPI Cards Row -->
    <div class="grid grid-cols-2 xl:grid-cols-3 gap-5 mb-8">

        <!-- CA mois en cours -->
        <div class="kpi-card bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">CA Mois</span>
                <div class="w-9 h-9 bg-green-100 rounded-xl flex items-center justify-center">
                    <svg class="h-5 w-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                </div>
            </div>
            <p id="caValue"
               class="text-3xl font-bold text-green-600 leading-tight"
               th:text="${#numbers.formatDecimal(ca, 1, 'COMMA', 0, 'POINT')}"></p>
            <p class="text-xs text-slate-400 mt-1">MGA</p>
            <!-- Variation vs mois précédent -->
            <div class="mt-3 flex items-center gap-1 text-xs"
                 th:if="${caPrecedent != null and caPrecedent.compareTo(0) != 0}">
                <span th:if="${ca >= caPrecedent}" class="text-green-500">▲</span>
                <span th:if="${ca < caPrecedent}"  class="text-red-500">▼</span>
                <span class="text-slate-500">vs mois précédent</span>
            </div>
        </div>

        <!-- Bénéfice -->
        <div class="kpi-card bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Bénéfice</span>
                <div class="w-9 h-9 bg-amber-100 rounded-xl flex items-center justify-center">
                    <svg class="h-5 w-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2"/></svg>
                </div>
            </div>
            <p id="beneficeValue"
               class="text-3xl font-bold leading-tight"
               th:classappend="${benefice >= 0} ? 'text-green-600' : 'text-red-600'"
               th:text="${#numbers.formatDecimal(benefice, 1, 'COMMA', 0, 'POINT')}"></p>
            <p class="text-xs text-slate-400 mt-1">MGA</p>
        </div>

        <!-- Solde Trésorerie -->
        <div class="kpi-card bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Solde Trésorerie</span>
                <div class="w-9 h-9 bg-blue-100 rounded-xl flex items-center justify-center">
                    <svg class="h-5 w-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                </div>
            </div>
            <p id="soldeValue"
               class="text-3xl font-bold text-blue-600 leading-tight"
               th:text="${#numbers.formatDecimal(solde, 1, 'COMMA', 0, 'POINT')}"></p>
            <p class="text-xs text-slate-400 mt-1">MGA</p>
        </div>

        <!-- Entrées -->
        <div class="kpi-card bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Entrées Mois</span>
                <div class="w-9 h-9 bg-teal-100 rounded-xl flex items-center justify-center">
                    <svg class="h-5 w-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </div>
            </div>
            <p id="entreesValue"
               class="text-3xl font-bold text-teal-600 leading-tight"
               th:text="${#numbers.formatDecimal(entrees, 1, 'COMMA', 0, 'POINT')}"></p>
    
               <p class="text-xs text-slate-400 mt-1">MGA</p>
        </div>

        <!-- Sorties -->
        <div class="kpi-card bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Sorties Mois</span>
                <div class="w-9 h-9 bg-red-100 rounded-xl flex items-center justify-center">
                    <svg class="h-5 w-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
                </div>
            </div>
            <p id="sortiesValue"
               class="text-3xl font-bold text-red-600 leading-tight"
               th:text="${#numbers.formatDecimal(sorties, 1, 'COMMA', 0, 'POINT')}"></p>
            <p class="text-xs text-slate-400 mt-1">MGA</p>
        </div>

        <!-- Liens rapides -->
        <div class="bg-brand-dark rounded-2xl p-6 flex flex-col justify-between">
            <p class="text-sm font-semibold text-white mb-4">Accès rapide</p>
            <div class="space-y-2">
                <a href="/finance/journal"    class="block px-3 py-2 bg-white/10 text-white text-sm rounded-lg hover:bg-white/20 transition-colors">📋 Journal</a>
                <a href="/finance/bilan"      class="block px-3 py-2 bg-white/10 text-white text-sm rounded-lg hover:bg-white/20 transition-colors">📊 Bilan</a>
                <a href="/finance/tresorerie" class="block px-3 py-2 bg-white/10 text-white text-sm rounded-lg hover:bg-white/20 transition-colors">💳 Trésorerie</a>
            </div>
        </div>
    </div>

    <!-- Graphique évolution CA -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h2 class="font-semibold text-slate-800 mb-6">Évolution du CA — 12 derniers mois</h2>
        <canvas id="caChart" height="100"></canvas>
    </div>
</main>

<!-- Chart.js Script -->
<!--<script th:inline="javascript">
    window.evolutionCA = /*[[${evolutionCA}]]*/ [];
</script>
-->
<script src="/js/Kpi-chart.js"></script>
</body>
</html>
