<!DOCTYPE html>

<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Charbon Vert - Nouvelle Commande</title>
    <!-- BEGIN: External Scripts -->
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" />
    <!-- END: External Scripts -->
    <style data-purpose="custom-scrollbar">
        /* Custom scrollbar for the sidebar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
    </style>
</head>

<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex">
    <aside th:replace="~{fragments/sidebar :: sidebar('commandes')}"></aside>
    <!-- BEGIN: MainContent -->
    <main class="flex-1">
        <header th:replace="~{fragments/commande-header}"></header>
        <section class="mb-10 p-8">
            <!-- Form Title Section -->
            <div class="mb-8">
                <h3 class="text-3xl font-serif text-brand-dark mb-1">Nouvelle commande</h3>
                <p class="text-sm text-gray-500">Enregistrer une commande client. Le montant à payer est calculé
                    automatiquement.</p>
            </div>

            <div th:if="${error != null && !#strings.isEmpty(error)}"
                class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
                <span th:text="${error}">Une erreur est survenue.</span>
            </div>
            <div th:if="${errorMessage != null && !#strings.isEmpty(errorMessage)}"
                class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700">
                <span th:text="${errorMessage}">Une erreur est survenue.</span>
            </div>
            <div th:if="${success != null && !#strings.isEmpty(success)}"
                class="mb-6 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">
                <span th:text="${success}">Opération réalisée avec succès.</span>
            </div>
            <div th:if="${successMessage != null && !#strings.isEmpty(successMessage)}"
                class="mb-6 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-700">
                <span th:text="${successMessage}">Opération réalisée avec succès.</span>
            </div>
            <div th:if="${message != null && !#strings.isEmpty(message)}"
                class="mb-6 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-700">
                <span th:text="${message}">Information.</span>
            </div>
            <!-- Main Form Card -->
            <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 max-w-5xl"
                data-purpose="order-form">
                <form class="space-y-6" method="post" action="">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                        <!-- Row 1 -->
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-2">Client</label>
                            <input
                                class="w-full border-gray-300 rounded-md shadow-sm focus:border-brand-success focus:ring-brand-success text-sm px-4 py-2.5"
                                placeholder="Nom du client" type="text" value="" id="input" list="clients" />
                            <input type="hidden" name="client.id" value="" id="idClient">
                            <datalist id="clients">
                                <option th:each="client : ${clients}" th:value="${client.nom}" th:attr="data-real-value=${client.id}"></option>
                            </datalist>
                            <span th:if="${errorClient != null}" th:text="${errorClient}" class="text-red-700" ></span>
                        </div>
                        <!-- Row 2 -->
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-2">Date souhaitée</label>
                            <div class="relative">
                                <input
                                    class="w-full border-gray-300 rounded-md shadow-sm focus:border-brand-success focus:ring-brand-success text-sm px-4 py-2.5"
                                    placeholder="jj / mm / aaaa" id="date" type="date" name="dateCommandeStr" />
                            </div>
                        </div>

                    </div>
                    <!-- Form Actions -->
                    <div class="flex items-center gap-4 pt-4">
                        <button
                            class="bg-brand-success text-white px-6 py-2.5 rounded-md text-sm font-medium hover:bg-opacity-90 transition-all shadow-sm"
                            type="submit">
                            Enregistrer la commande
                        </button>
                        <a href="/cmd">
                                                    <button
                            class="bg-white border border-gray-200 text-gray-700 px-6 py-2.5 rounded-md text-sm font-medium hover:bg-gray-50 transition-all"
                            type="button">
                            Annuler
                        </button>
                        </a>
                        <p class="text-[11px] text-gray-400 italic ml-2">Si la date n'est pas fournie, la date du jour sera utiliée.</p>
                    </div>
                </form>
            </section>
        </section>
    </main>
    <!-- END: MainContent -->
     <script>
        const input = document.getElementById("input");
        const list = document.getElementById("clients");
        input.addEventListener("input", function(e) {
            const selected = list.querySelector(`option[value="${e.target.value}"]`);
            if(selected) {
                const realValue = selected.getAttribute("data-real-value");
                document.getElementById("idClient").value = realValue;
            } else {
                document.getElementById("idClient").value = "";
            }
        });
        document.getElementById("date").valueAsDate = new Date();
     </script>
</body>

</html>
