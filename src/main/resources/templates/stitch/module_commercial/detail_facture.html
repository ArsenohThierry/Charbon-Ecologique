<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Charbon Vert - Facture</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" href="../../../static/css/output.css" />
    <link rel="stylesheet" th:href="@{/css/fonts.css}" href="../../../static/css/fonts.css" />
</head>

<body class="bg-brand-light font-sans text-slate-800 min-h-screen flex">
    <aside th:replace="~{fragments/sidebar :: sidebar('factures')}"></aside>
    <main class="flex-1 min-h-screen">
        <header class="flex items-center justify-between px-8 py-4 bg-white border-b border-gray-100">
            <div>
                <h2 class="text-lg font-bold text-brand-dark">Commercial & finance</h2>
                <p class="text-xs text-gray-500">Commandes, livraisons & trésorerie</p>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full border border-gray-200">Maquette ·
                    données fictives</span>
                <div
                    class="w-8 h-8 bg-brand-dark text-white rounded-full flex items-center justify-center text-sm font-bold">
                    N</div>
            </div>
        </header>

        <section class="p-8">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h1 class="font-serif text-4xl text-brand-dark mb-2">Détail de la facture</h1>
                        <p class="text-gray-500" th:text="${facture.reference}">FACT-2026-0001</p>
                    </div>
                    <a href="/factures"
                        class="text-sm text-slate-500 hover:text-brand-success transition flex items-center gap-1">
                        ← Retour
                    </a>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 p-8 shadow-sm space-y-6">
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Réf.
                                paiement</label>
                            <p class="text-lg font-bold text-brand-dark mt-1"
                                th:text="${facture.paiement != null ? facture.paiement.id : 'N/A'}">PAI-001</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Réf.
                                commande</label>
                            <p class="text-lg font-bold text-brand-dark mt-1"
                                th:text="${facture.paiement != null && facture.paiement.commande != null ? facture.paiement.commande.reference : 'N/A'}">
                                CMD-001</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Client</label>
                            <p class="text-lg font-bold text-brand-dark mt-1"
                                th:text="${facture.paiement != null && facture.paiement.commande != null ? facture.paiement.commande.client.nom : 'Client'}">
                                Client</p>
                        </div>
                    </div>

                    <div class="border-t border-slate-200 pt-6">
                        <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Lignes de facture
                        </h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr
                                        class="text-xs uppercase tracking-wider text-slate-400 border-b border-slate-100">
                                        <th class="pb-2 font-semibold">Libellé</th>
                                        <th class="pb-2 font-semibold text-right">P.U (Ar)</th>
                                        <th class="pb-2 font-semibold text-center">Quantité</th>
                                        <th class="pb-2 font-semibold text-right">Montant</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50 text-slate-700 text-sm">
                                    <tr th:each="d : ${details}" class="hover:bg-slate-50/50 transition-colors">
                                        <td class="py-3 font-medium" th:text="${d.libelle}">Montant commande</td>
                                        <td class="py-3 text-right"
                                            th:text="${d.pu != null ? #numbers.formatDecimal(d.pu, 1, 'DEFAULT', 2, 'POINT') : '0.00'}">
                                            0.00</td>
                                        <td class="py-3 text-center font-semibold text-slate-600"
                                            th:text="${d.quantite != null ? d.quantite : '1'}">1</td>
                                        <td class="py-3 text-right font-semibold text-brand-dark"
                                            th:text="${#numbers.formatDecimal(d.montant, 1, 'DEFAULT', 2, 'POINT')} + ' Ar'">
                                            0.00 Ar</td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr class="border-t border-slate-200">
                                        <td colspan="3" class="pt-4 font-bold text-brand-dark text-base">Total Général
                                        </td>
                                        <td class="pt-4 text-right font-bold text-brand-dark text-xl"
                                            th:text="${#numbers.formatDecimal(montantTotal, 1, 'DEFAULT', 2, 'POINT')} + ' Ar'">
                                            0.00 Ar
                                        </td>
                                    </tr>
                                </tfoot>
                            </table>
                            <a th:href="@{/factures/export/{id}(id=${facture.id})}" target="_blank"
                                class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-5 py-2.5 text-center text-sm font-medium text-white shadow-sm transition-all duration-200 hover:bg-blue-700 hover:shadow focus:outline-none focus:ring-4 focus:ring-blue-300">

                                <svg class="h-4 w-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                                </svg>

                                Télécharger la Facture
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
